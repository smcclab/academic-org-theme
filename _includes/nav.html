<nav class="navbar navbar-expand-lg">
  <div class="container-lg">
  <a class="navbar-brand" href="#">
    {% if site.logo_light and site.logo_dark %}
    <img src="{{ site.logo_light | relative_url }}"
         width="80"
         class="d-inline-block align-top"
         alt="{{ site.title }}"
         data-light-img="{{ site.logo_light | relative_url }}"
         data-dark-img="{{ site.logo_dark | relative_url }}">
    {% elsif site.logo %}
    <img src="{{ site.logo | relative_url }}" width="80" class="d-inline-block align-top" alt="{{ site.title }}">
    {% endif %}
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
  <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
    <ul class="navbar-nav">
      {% for link in site.navigation_header %}
      {% assign class = nil %}
      {% if page.url == link.url %}
      {% assign class = "active" %}
      {% endif %}
      <li class="nav-item {{ class }}">
      <a class="nav-link {{ class }}" href="{{ site.baseurl }}{{ link.url }}">{{ link.title }}</a>
      </li>
      {% endfor %}
    </ul>

    <button id="themeToggle" class="btn btn-outline-secondary" type="button" aria-label="Toggle colour theme">
      <i class="fa-solid fa-circle-half-stroke"></i> Auto
    </button>
  </div>
  </div>
</nav>

<script>
  (function () {
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const mql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

    function getChoice() {
      try {
        const v = localStorage.getItem('theme');
        if (v === 'light' || v === 'dark') return v;
      } catch (_) {}
      return 'auto';
    }

    function resolve(choice) {
      if (choice === 'light' || choice === 'dark') return choice;
      return (mql && mql.matches) ? 'dark' : 'light';
    }

    function updateImages(theme) {
      const key = theme === 'dark' ? 'darkImg' : 'lightImg';
      document.querySelectorAll('[data-light-img][data-dark-img]').forEach((el) => {
        const url = el.dataset[key];
        if (!url) return;
        if (el.tagName === 'IMG') {
          el.src = url;
        } else {
          el.style.backgroundImage = `url('${url}')`;
        }
      });
    }

    function updateButton(choice, theme) {
      let icon, label;
      if (choice === 'auto') { icon = 'fa-circle-half-stroke'; label = 'Auto'; }
      else if (choice === 'dark') { icon = 'fa-moon'; label = 'Dark'; }
      else { icon = 'fa-sun'; label = 'Light'; }
      themeToggle.innerHTML = `<i class="fa-solid ${icon}"></i> ${label}`;
      themeToggle.classList.remove('btn-outline-secondary', 'btn-outline-light');
      themeToggle.classList.add(theme === 'dark' ? 'btn-outline-light' : 'btn-outline-secondary');
    }

    function apply(choice) {
      const theme = resolve(choice);
      html.setAttribute('data-bs-theme', theme);
      updateImages(theme);
      updateButton(choice, theme);
    }

    apply(getChoice());

    themeToggle.addEventListener('click', () => {
      const cur = getChoice();
      const next = cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto';
      try {
        if (next === 'auto') localStorage.removeItem('theme');
        else localStorage.setItem('theme', next);
      } catch (_) {}
      apply(next);
    });

    if (mql) {
      const onChange = () => { if (getChoice() === 'auto') apply('auto'); };
      if (mql.addEventListener) mql.addEventListener('change', onChange);
      else if (mql.addListener) mql.addListener(onChange);
    }
  })();
</script>
