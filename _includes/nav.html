<nav class="navbar navbar-expand-lg">
  <div class="container-lg">
  <a class="navbar-brand" href="#">
    {% if site.logo_light and site.logo_dark %}
    <img src="{{ site.logo_light | relative_url }}"
         width="80"
         class="d-inline-block align-top"
         alt="{{ site.title }}"
         data-light-img="{{ site.logo_light | relative_url }}"
         data-dark-img="{{ site.logo_dark | relative_url }}">
    {% elsif site.logo %}
    <img src="{{ site.logo | relative_url }}" width="80" class="d-inline-block align-top" alt="{{ site.title }}">
    {% endif %}
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
  <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
    <ul class="navbar-nav">
      {% for link in site.navigation_header %}
      {% assign class = nil %}
      {% if page.url == link.url %}
      {% assign class = "active" %}
      {% endif %}
      <li class="nav-item {{ class }}">
      <a class="nav-link {{ class }}" href="{{ site.baseurl }}{{ link.url }}">{{ link.title }}</a>
      </li>
      {% endfor %}
    </ul>

    <button id="themeToggle" class="btn btn-outline-secondary">
      <i class="bi bi-sun-fill"></i> Light
    </button>
  </div>
  </div>
</nav>

<script>
  (function () {
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');

    if (!html.getAttribute('data-bs-theme')) {
      html.setAttribute('data-bs-theme', 'light');
    }

    function applyTheme(theme) {
      html.setAttribute('data-bs-theme', theme);
      const key = theme === 'dark' ? 'darkImg' : 'lightImg';

      if (theme === 'dark') {
        themeToggle.innerHTML = '<i class="bi bi-moon-fill"></i> Dark';
        themeToggle.classList.remove('btn-outline-secondary');
        themeToggle.classList.add('btn-outline-light');
      } else {
        themeToggle.innerHTML = '<i class="bi bi-sun-fill"></i> Light';
        themeToggle.classList.remove('btn-outline-light');
        themeToggle.classList.add('btn-outline-secondary');
      }

      document.querySelectorAll('[data-light-img][data-dark-img]').forEach((el) => {
        const url = el.dataset[key];
        if (!url) return;
        if (el.tagName === 'IMG') {
          el.src = url;
        } else {
          el.style.backgroundImage = `url('${url}')`;
        }
      });
    }

    themeToggle.addEventListener('click', () => {
      const next = html.getAttribute('data-bs-theme') === 'light' ? 'dark' : 'light';
      applyTheme(next);
    });
  })();
</script>
